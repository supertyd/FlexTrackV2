name: flextrackv2 AWS6 8GPU
description: flextrackv2 interactive 8GPU runner on aws_6 (migrated from 92av62ravp)
command: sleep infinity
project_id: anst_model_training
priority: 1
attribution:
  area: Other
  record: Other
cluster_options:
  aws:
    instance_type: p4d.24xlarge
environment_variables:
  PYTHONPATH: /mnt/task_runtime:$PYTHONPATH
expires_in: 1y
permissions:
  owners: tan_yuedong
  viewers:
    - tan_yuedong
resources:
  cluster:
    - aws_6
  disk_gb: 4000
  docker_image: docker.apple.com/anst-dev/ubuntu20.04-python3.8-cuda11.8-torch2.1.1:2024-11-07
  memory_gb: 1100
  num_cpus: 96
  num_gpus: 8
  ports:
    - JUPYTER_PORT
    - BOLT_TAB_Gradio
  task_type: 8gpu
  timeout: 14d
scheduling_options:
  preemptible: false
tags:
  - flextrackv2
  - CVL
