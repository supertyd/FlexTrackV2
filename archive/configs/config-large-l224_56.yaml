name: 'flextrackv2 large l224 (V56 backbone scale-up) 4GPU'
description: 'FlexTrack-V2 large backbone (fastitpnl, flextrackv2_l224 init) trained with the V56 BMR-HMoE + CMA recipe, isolated dedicated 4-GPU node'
tags: ['flextrackv2', 'CVL', 'large']
project_id: anst_model_training
priority: 1
setup_command: 'bash install.sh'
command: 'sleep infinity'
scheduling_options:
  preemptible: False
cluster_options:
  aws:
    instance_type: p6-b200.48xlarge
resources:
  cluster: aws_10
  docker_image: docker.apple.com/anst-dev/ubuntu20.04-python3.8-cuda11.8-torch2.1.1:2024-11-07
  ports: ['JUPYTER_PORT', "BOLT_TAB_Gradio"]
  timeout: 14d
  task_type: 4gpu
  disk_gb: 4000
is_parent: False
environment_variables:
  PYTHONPATH: '/mnt/task_runtime:$PYTHONPATH'
  # HF_TOKEN is intentionally NOT set here — it would be persisted in this
  # task's config, visible to everyone in permissions.viewers. Instead,
  # export it manually in the interactive SSH session right before running
  # provision_ablation_node.sh (see ABLATIONS.md).
attribution:
  area: Other
  record: "Other"
permissions:
  viewers:
  - cvl-anst-training
