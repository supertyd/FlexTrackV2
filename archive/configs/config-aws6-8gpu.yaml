name: 'flextrackv2 AWS6 8GPU'
description: 'flextrackv2 interactive 8GPU runner on aws_6'
tags: ['flextrackv2', 'CVL']
project_id: anst_model_training
priority: 1
command: 'sleep infinity'
scheduling_options:
  preemptible: False
cluster_options:
  aws:
    instance_type: p4d.24xlarge
resources:
  cluster: aws_6
  docker_image: docker.apple.com/anst-dev/ubuntu20.04-python3.8-cuda11.8-torch2.1.1:2024-11-07
  ports: ['JUPYTER_PORT', "BOLT_TAB_Gradio"]
  timeout: 14d
  task_type: 8gpu
  disk_gb: 4000
is_parent: False
environment_variables:
  PYTHONPATH: '/mnt/task_runtime:$PYTHONPATH'
attribution:
  area: Other
  record: "Other"
permissions:
  viewers:
  - cvl-anst-training
