name: 'flextrackv2 ablation cma_fixed020'
description: 'V56 TPAMI ablation: flextrackv2_b224_56_abl_cma_fixed020'
tags: ['flextrackv2', 'CVL', 'ablation']
project_id: anst_model_training
priority: 1
setup_command: 'bash install.sh'
command: 'sleep infinity'
scheduling_options:
  preemptible: False
cluster_options:
  aws:
    instance_type: p6-b200.48xlarge
resources:
  cluster: aws_10
  docker_image: docker.apple.com/anst-dev/ubuntu20.04-python3.8-cuda11.8-torch2.1.1:2024-11-07
  ports: ['JUPYTER_PORT', "BOLT_TAB_Gradio"]
  timeout: 14d
  task_type: 8gpu
  disk_gb: 4000
is_parent: False
environment_variables:
  PYTHONPATH: '/mnt/task_runtime:$PYTHONPATH'
  # Set this to a real token before submitting — never hardcode it in a
  # committed file. Pass via: bolt task submit --config ... \
  #   --update-config environment_variables.HF_TOKEN=<token>
  HF_TOKEN: 'REPLACE_ME'
attribution:
  area: Other
  record: "Other"
permissions:
  viewers:
  - cvl-anst-training
